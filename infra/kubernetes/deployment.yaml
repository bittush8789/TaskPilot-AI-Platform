apiVersion: v1
kind: Namespace
metadata:
  name: taskpilot
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: taskpilot
data:
  DATABASE_URL: "sqlite:///./taskpilot.db"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: taskpilot
type: Opaque
data:
  GEMINI_API_KEY: "Y29uZmlndXJlLXlvdXItYXBpLWtleS1oZXJl" # base64 encoded placeholder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskpilot-backend
  namespace: taskpilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskpilot
  template:
    metadata:
      labels:
        app: taskpilot
    spec:
      containers:
      - name: backend
        image: taskpilot-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: taskpilot-service
  namespace: taskpilot
spec:
  selector:
    app: taskpilot
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskpilot-hpa
  namespace: taskpilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskpilot-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
