version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: taskpilot_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: taskpilot_db
      MYSQL_USER: taskpilot_user
      MYSQL_PASSWORD: taskpilot_password
    ports:
      - "3306:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "taskpilot_user", "-ptaskpilot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: taskpilot_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://taskpilot_user:taskpilot_password@db:3306/taskpilot_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

volumes:
  mysql_data:
